services:
  # ── Backend ─────────────────────────────────────────────────────────
  - type: web
    name: quorum-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    disk:
      name: quorum-db
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DB_PATH
        value: /data/quorum.db
      - key: ALLOWED_ORIGINS
        value: https://quorum-frontend.onrender.com
      # Add your secret keys in the Render dashboard (do not commit them here):
      # ANTHROPIC_API_KEY, etc.

  # ── Frontend ─────────────────────────────────────────────────────────
  - type: web
    name: quorum-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://quorum-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
